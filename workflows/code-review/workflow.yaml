workflow:
  name: code-review
  description: Multi-agent code review — one agent reviews, another critiques the review.
  entry_point: reviewer
  input:
    code:
      type: string
      description: The code to review
  runtime:
    default_model: claude-sonnet-4

agents:
  - name: reviewer
    prompt: |
      Review the following code. Identify bugs, style issues, and
      potential improvements. Be specific and cite line numbers where possible.

      ```
      {{ workflow.input.code }}
      ```
    output:
      review:
        type: string
        description: The code review feedback
    routes:
      - to: critic

  - name: critic
    prompt: |
      You are a senior engineer. Evaluate the following code review for
      accuracy and completeness. Call out anything the reviewer missed
      or got wrong. If the review is solid, say so briefly.

      Original code:
      ```
      {{ workflow.input.code }}
      ```

      Review:
      {{ reviewer.output.review }}
    output:
      critique:
        type: string
        description: Critique of the review
    routes:
      - to: $end

output:
  review: "{{ reviewer.output.review }}"
  critique: "{{ critic.output.critique }}"
