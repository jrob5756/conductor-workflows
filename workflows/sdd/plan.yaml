# Plan Workflow
#
# This workflow creates a comprehensive solution design and implementation plan
# that is closely grounded in the codebase. It combines high-level architectural
# design (decisions, trade-offs, alternatives) with actionable implementation
# planning (epics, tasks, file changes).
#
# When an existing solution design document is provided via the `design`
# input, the workflow skips the design phase and produces ONLY an
# implementation plan grounded in that design (a typical pairing with the
# `sdd-design` workflow, which authors the design document on its own).
#
# The plan is reviewed by the `document-review` sub-workflow, which scores it
# on technical accuracy and readability. If either score is below the
# threshold (90), the workflow loops back to the architect for revision.
#
# Usage:
#   conductor run workflows/sdd/plan.yaml --input purpose="Build a user authentication system with OAuth2"
#
# With explicit output path:
#   conductor run workflows/sdd/plan.yaml --input purpose="..." --input output_path="docs/auth-migration.plan.md"
#
# Plan-only mode (consume an existing design):
#   conductor run workflows/sdd/plan.yaml \
#     --input purpose="..." \
#     --input design="docs/auth-migration.design.md"
#
# With verbose output:
#   conductor -V run workflows/sdd/plan.yaml --input purpose="..."
#
# Flow:
#   architect → document_review (sub-workflow)
#     → $end                  (when both reviews are approved)
#     → architect             (when either review is not approved)

workflow:
  name: plan
  description: Create a comprehensive solution design with implementation plan grounded in the codebase, reviewed by the document-review sub-workflow for technical accuracy and readability. Accepts an optional `design` input to produce only the implementation plan from an existing design document.
  version: "2.2.0"
  entry_point: architect

  runtime:
    provider: copilot
    mcp_servers:
      web-search:
        command: npx
        args: ["-y", "open-websearch@latest"]
        env:
          MODE: stdio
          DEFAULT_SEARCH_ENGINE: duckduckgo
          ALLOWED_SEARCH_ENGINES: duckduckgo,brave,exa
        tools: ["search"] # others use playwright
      context7:
        command: npx
        args: ["-y", "@upstash/context7-mcp@latest"]
        tools: ["*"]
      ms-learn:
        type: http
        url: https://learn.microsoft.com/api/mcp
        tools: ["*"]

  input:
    purpose:
      type: string
      required: true
      description: A clear description of the feature, change, or initiative to design and plan
    output_path:
      type: string
      required: false
      description: Optional file path for the plan document (e.g. docs/my-feature.plan.md)
    design:
      type: string
      required: false
      description: Optional path to an existing solution design document. When provided, the workflow skips the design phase and produces only an implementation plan grounded in that design.

  context:
    mode: explicit

  limits:
    max_iterations: 50

agents:
  - name: architect
    description: Researches the codebase and broader context, then authors a solution design document with actionable implementation plan
    model: claude-opus-4.7-1m-internal
    reasoning:
      effort: high
    input:
      - workflow.input.purpose
      - workflow.input.output_path?
      - workflow.input.design?
      - architect.output?
      - document_review.output?
    system_prompt: |
      You are a Principal Software Architect. You analyze requirements deeply, research the
      existing codebase, and produce clear, high-level technical design documents with
      actionable implementation plans.

      Your core capabilities include:
      - Designing scalable, maintainable architectures
      - Analyzing existing codebases to ground designs in reality
      - Identifying architectural patterns, trade-offs, and alternatives
      - Writing precise, fact-based design documents for cross-team alignment
      - Documenting APIs, data flows, and component interactions
      - Identifying risks, dependencies, and open questions
      - Breaking complex designs into discrete, actionable epics
      - Identifying file changes, dependencies, and prerequisites
      - Creating task breakdowns with effort estimates

      Your documents are:
      - High-level but grounded in the actual codebase (not abstract hand-waving)
      - Focused on *what* and *why* for design sections, with concrete *how* in the implementation plan
      - Structured for engineering and architecture audiences
      - Honest about trade-offs, risks, and open questions
      - Actionable — a developer or AI agent should be able to execute the plan
    prompt: |
      {% if workflow.input.design %}
      Create an implementation plan for an existing solution design.
      {% else %}
      Create a solution design and implementation plan based on the following purpose:
      {% endif %}

      **Purpose:** {{ workflow.input.purpose }}

      {% if document_review is defined and document_review.output and document_review.output.technical_review_score and not document_review.output.technical_review_approved %}
      **Technical Review Feedback (Score: {{ document_review.output.technical_review_score }}/100):**
      {{ document_review.output.technical_review_feedback }}

      **IMPORTANT:** You are revising an existing document. Read the document at
      `{{ architect.output.file_path }}` and update it to address the feedback.
      Preserve content that is satisfactory.
      {% endif %}

      {% if document_review is defined and document_review.output and document_review.output.readability_review_score and not document_review.output.readability_review_approved %}
      **Readability Review Feedback (Score: {{ document_review.output.readability_review_score }}/100):**
      {{ document_review.output.readability_review_feedback }}

      **IMPORTANT:** You are revising an existing document. Read the document at
      `{{ architect.output.file_path }}` and update it to address the feedback.
      Preserve content that is satisfactory.
      {% endif %}

      ---

      {% if workflow.input.design %}
      ## Source Design Document

      You are producing the implementation plan for an existing, already-reviewed
      solution design. Read the design at:

      `{{ workflow.input.design }}`

      Treat the design as the authoritative source of truth:

      - Do **not** re-derive design decisions, alternatives, or trade-offs — the
        design has already settled them.
      - Do **not** duplicate design content in your output. Reference the design
        by section/heading when explaining what each task delivers.
      - Do **not** re-litigate the design. If you discover genuine gaps,
        ambiguities, or inconsistencies that block planning, surface them in
        the **Open Questions** section instead of silently choosing.

      You should still browse the codebase as needed to:

      - Confirm concrete file paths, existing patterns, and naming conventions
      - Verify task feasibility against the current code
      - Identify prerequisites and sequencing constraints

      ---

      ## Implementation Plan Document

      Write the document with the following sections:
      {% else %}
      ## Phase 1: Research

      Before drafting, perform thorough research:

      ### Codebase Analysis
      - Explore the relevant portions of the codebase deeply
      - Identify existing components, patterns, abstractions, and conventions
      - Understand the current architecture and how data flows
      - Map out dependencies between components
      - Note any technical debt or constraints that affect the design

      ### External Research
      - Search the web for context on relevant technologies and best practices
      - Research similar designs and architectural patterns
      - Look up documentation for key libraries, frameworks, or protocols involved
      - Identify industry standards or conventions that apply

      ---

      ## Phase 2: Design & Plan Document

      Write the document with the following sections:

      ### Executive Summary
      One paragraph describing the proposal, its motivation, and expected outcome.

      ### Background
      - Current state of the system and relevant architecture
      - Context that motivates this design (why now, what changed)
      - Prior art or related work in the codebase

      ### Problem Statement
      Clearly define the problem(s) this design addresses. Be specific about
      pain points, limitations, or gaps in the current system.

      ### Goals and Non-Goals
      **Goals** — specific, measurable outcomes this design aims to achieve.
      **Non-Goals** — explicit exclusions to keep scope focused.

      ### Requirements
      Define functional and non-functional requirements.

      ### Proposed Design

      Provide the core of the design:
      - **Architecture Overview** — high-level component diagram and how pieces fit together
      - **Key Components** — each major component with its responsibilities and interfaces
      - **Data Flow** — how data moves through the system for key operations
      - **API Contracts** — public interfaces, protocols, or contracts (if applicable)
      - **Design Decisions** — key decisions made and the rationale behind each

      ### Alternatives Considered *(optional)*
      For each significant design decision, describe:
      - What alternatives were evaluated
      - Pros and cons of each
      - Why the chosen approach was selected

      Include this section when the design involves non-obvious choices between
      viable approaches. Skip if the solution is straightforward.

      ### Dependencies
      - External dependencies (libraries, services, infrastructure)
      - Internal dependencies (other components, teams, systems)
      - Sequencing constraints (what must happen before this design can proceed)

      ### Impact Analysis *(optional)*
      - Components and areas of the codebase affected
      - Backward compatibility considerations
      - Performance implications
      - Operational impact (deployment, monitoring, debugging)

      Include this section when the design touches multiple components or has
      compatibility/performance implications. Skip for isolated changes.

      ### Security Considerations *(optional)*
      - Authentication, authorization, and access control implications
      - Data protection and privacy concerns
      - Attack surface changes

      Include this section when the design affects security boundaries, handles
      sensitive data, or changes the attack surface. Skip if not applicable.

      ### Risks and Mitigations *(optional)*
      Table with: Risk, Likelihood (Low/Medium/High), Impact (Low/Medium/High), Mitigation.

      Include this section when the design carries meaningful technical, operational,
      or schedule risks. Skip for low-risk changes.
      {% endif %}

      ### Open Questions
      Items requiring further discussion, investigation, or decision from stakeholders.
      {% if workflow.input.design %}In plan-only mode, surface any gaps,
      ambiguities, or inconsistencies in the source design that prevented
      confident planning.{% endif %}

      ### Implementation Phases
      Break down the implementation into logical phases with exit criteria.

      ### Files Affected

      #### New Files
      | File Path | Purpose |
      |-----------|---------|

      #### Modified Files
      | File Path | Changes |
      |-----------|---------|

      #### Deleted Files
      | File Path | Reason |
      |-----------|--------|

      ### Implementation Plan

      For each epic, provide:
      - **Goal**: What this epic achieves
      - **Prerequisites**: Dependencies on other epics
      - **Tasks**: Table with Task ID, Type (IMPL/TEST), Description, Files, and Status (TO DO/IN PROGRESS/DONE)
      - **Acceptance Criteria**: Checkboxes for completion

      Keep epics focused—ideally affecting no more than 7 files and completable within 1-2 weeks.
      Tests should be created alongside implementation tasks.

      ### References
      Links to relevant documentation, prior art, RFCs, or external resources.
      {% if workflow.input.design %} Include a reference to the source design
      document at `{{ workflow.input.design }}`.{% endif %}

      ---

      Be thorough and specific. Ground every claim in evidence from the codebase or research.
      Avoid vague or aspirational language — if something is uncertain, call it out as an open question.

      ---

      ## REVISION NOTES

      {% if document_review is defined and document_review.output %}
      After revising the document, provide a concise summary of what you changed and why
      in your `revision_notes` output. Structure it as a bullet list, e.g.:
      - Corrected gRPC version numbers per technical reviewer feedback
      - Rewrote Executive Summary for clarity per readability feedback
      - Added missing risk mitigation for database migration

      This helps reviewers understand what changed.
      {% else %}
      This is the first draft. Set `revision_notes` to "Initial draft."
      {% endif %}

      ---

      ## SAVING THE DOCUMENT

      After creating the document, save it to a file.

      {% if workflow.input.output_path %}
      Save the document to: `{{ workflow.input.output_path }}`
      {% elif workflow.input.design %}
      Derive the file path from the source design document at
      `{{ workflow.input.design }}`:

      - If the design path ends in `.design.md`, replace that suffix with
        `.plan.md` and save in the same directory. Examples:
        - `docs/auth-migration.design.md` → `docs/auth-migration.plan.md`
        - `jwt-rotation.design.md` → `jwt-rotation.plan.md`
      - Otherwise, save next to the design with the same base name and a
        `.plan.md` suffix. Example:
        - `docs/auth-migration.md` → `docs/auth-migration.plan.md`
      {% else %}
      Choose a file path using the following convention:

      - If the purpose input references a document path, derive the name from that document
        and save it in the same directory. Examples:
        - `upgrade-database-v2.brainstorm.md` → `upgrade-database-v2.plan.md`
        - `add-user-authentication.md` → `add-user-authentication.plan.md`
      - Otherwise:
        - Save the document in the current working directory.
        - Use the naming convention: `[descriptive-slug].plan.md`
        - Examples:
          - `jwt-authentication-migration.plan.md`
          - `event-sourcing-pipeline.plan.md`
      {% endif %}
    output:
      file_path:
        type: string
        description: The path where the plan document was saved
      revision_notes:
        type: string
        description: Summary of changes made in this revision (empty on first draft)
    routes:
      - to: document_review

  - name: document_review
    description: Reviews the plan document for technical accuracy and readability via the document-review sub-workflow
    type: workflow
    workflow: ../document/review.yaml
    input:
      - workflow.input.purpose
      - architect.output.file_path
    input_mapping:
      document_path: "{{ architect.output.file_path }}"
      purpose: "{{ workflow.input.purpose }}"
      technical_threshold: "90"
      readability_threshold: "90"
    routes:
      - to: $end
        when: "{{ document_review.output.technical_review_approved and document_review.output.readability_review_approved }}"
      - to: architect

output:
  purpose: "{{ workflow.input.purpose }}"
  plan_file: "{{ architect.output.file_path }}"
  technical_review_score: "{{ document_review.output.technical_review_score }}"
  readability_review_score: "{{ document_review.output.readability_review_score }}"
  technical_review_feedback: "{{ document_review.output.technical_review_feedback }}"
  readability_review_feedback: "{{ document_review.output.readability_review_feedback }}"
  iterations: "{{ context.iteration }}"
