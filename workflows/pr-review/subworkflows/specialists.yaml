      {{ workflow.input.focus }}
      {% endif %}

      ---

      For each issue: location, severity, issue description, hidden errors,
      user impact, recommendation, corrected example. Use IDs prefixed
      `S-ERR-`. Provide `overall_assessment` and `merge_readiness`.
      {% endif %}
    output:
      status: {type: string}
      findings:
        type: array
        items:
          type: object
          properties:
            id: {type: string}
            category: {type: string}
            severity: {type: string}
