  # ───────────────────────────────────────────────────────────────────────────
  # SPECIALIST_GATE — Validates that each specialist actually loaded the diff.
  # Detects "phantom" specialists that returned shape-valid output but never
  # read the diff (template substitution failed, file unreadable, etc).
  # Routes to consolidator (≥1 valid) or $end (0 valid).
  # ───────────────────────────────────────────────────────────────────────────
  - name: specialist_gate
    description: Validates specialist outputs and routes to consolidator (any valid) or termination (none valid)
    model: claude-haiku-4.5
    input:
      - specialist_review.outputs
    system_prompt: |
      You are a deterministic validator for PR-review specialist outputs.
      You do NOT review code. You inspect each specialist's output and
      decide whether they actually read the diff. Your output drives the
      workflow's degraded-mode logic and the consolidator's input set.

      For each specialist key in `specialist_review.outputs` (e.g.
      `specialist_code`, `specialist_security`, `specialist_tests`,
      `specialist_errors`, `specialist_types`, `specialist_comments`),
      classify the specialist as **skipped** if `status` equals `"skipped"`
      (triage decided this specialist isn't applicable to this PR — emit
      it under `skipped_specialists` and do not include it in
      valid/invalid). Otherwise classify as **invalid** if ANY of these hold:

      1. `status` is present and equals `"failed_to_load_diff"`.
      2. `overall_assessment` contains (case-insensitive) any sentinel
         indicating the specialist bailed without reading the diff:
         - "unfilled variable" / "unfilled template" / "unresolved template"
         - "unable to read" / "could not read" / "could not access" / "failed to load"
         - "prompt template contains" / "template substitution"
         - "no diff was provided" / "diff is not available"
      3. `findings` is `[]` AND `overall_assessment` starts with
         `"Reviewer failed to load the diff"`.
      4. `findings` is `[]` AND (`overall_assessment` is missing, empty,
         or shorter than 40 characters) AND no `status` field was
         emitted. This catches silent-failure cases where an agent
         returns the structured-output schema defaults without raising.

      Otherwise the specialist is **valid**.

      Output JSON with these fields:
      - `valid_count`: integer (0..N)
      - `valid_specialists`: array of specialist names that are valid
      - `invalid_specialists`: array of {name, reason} entries
      - `skipped_specialists`: array of specialist names with status='skipped'
      - `degraded`: boolean — true when invalid_specialists is non-empty
        (i.e. at least one specialist *that was supposed to run* failed —
        does NOT include triage-skipped specialists). The report writer
        uses this to emit a "⚠️ Degraded review" banner.

      Do NOT emit any other fields. Do NOT call any tools. Be deterministic.
    prompt: |
      Validate these specialist outputs and emit the routing decision JSON.

      ## Specialist outputs
      ```json
      {{ specialist_review.outputs | tojson }}
      ```
    output:
      valid_count:
        type: number
        description: "Count of specialists that produced a valid review."
      valid_specialists:
        type: array
        items: {type: string}
        description: "Names of specialists that produced valid output."
      invalid_specialists:
        type: array
        description: "Specialists that returned shape-valid output but did not actually review the diff."
        items:
          type: object
          properties:
            name: {type: string}
            reason: {type: string}
      skipped_specialists:
        type: array
        items: {type: string}
        description: "Specialists with status='skipped' (triage decided they don't apply to this PR)."
      degraded:
        type: boolean
        description: "True when at least one specialist that was supposed to run failed (excludes triage-skipped)."
    routes:
      - to: consolidator
        when: "{{ specialist_gate.output.valid_count >= 1 }}"
      - to: $end
        # All specialists failed or were skipped. Workflow ends with status='failure'.

  # ───────────────────────────────────────────────────────────────────────────
  # CONSOLIDATOR — Normalises specialists' native severities into the unified
  # finding schema, dedupes overlapping findings (±5 lines on same file with
  # overlapping descriptions), populates specialists_agreeing arrays.
  # Outputs the consolidated_findings list that lens reviewers deliberate over.
  # ───────────────────────────────────────────────────────────────────────────
  - name: consolidator
    description: Normalises specialist findings into a unified schema, dedupes overlapping findings across specialists, and ranks the consolidated set
    model: claude-sonnet-4.6
    input:
      - workflow.input.pr_data_dir
      - specialist_review.outputs
      - specialist_gate.output.valid_specialists
    system_prompt: |
      You are the finding consolidator. You take per-specialist findings
      (each with their own native severity scale and field set) and
      produce a single unified `consolidated_findings` list that lens
      reviewers will deliberate over.

      You do NOT add new findings. You do NOT review the code. You
      normalise, dedupe, and rank.

      ## Inputs

      Only consider specialists listed in `valid_specialists`. Ignore
      output from any specialist marked invalid by the gate.

      Each specialist returns findings with these per-specialist quirks:

      | Specialist          | Native scoring                          | Severity output      |
      |---------------------|-----------------------------------------|----------------------|
      | specialist_code     | confidence (0-100)                      | already 🔴/🟡/🔵     |
      | specialist_security | impact × exploitability = severity_score (1-9) | already 🔴/🟡/🔵 |
      | specialist_tests    | criticality (1-10)                      | already 🔴/🟡/🔵     |
      | specialist_errors   | hidden_errors array                     | already 🔴/🟡/🔵     |
      | specialist_types    | dimensions object                       | 🟡 / 🔵              |
      | specialist_comments | comment_kind label                      | 🟡 / 🔵              |

      ## Normalised finding schema

      Every output finding MUST have:
      - `id`: keep the specialist's native ID (e.g. `S-CODE-001`, `S-TESTS-003`)
      - `category`: correctness | security | error_handling | performance | testing | completeness
      - `severity`: 🔴 critical | 🟡 warning | 🔵 suggestion
      - `file`, `line_range`
      - `description`, `recommendation`, `suggested_fix`
      - `conviction`: 1-10 (carry through from the specialist)
      - `source_specialist`: name of the specialist that raised it
      - `specialists_agreeing`: array of specialist names that ALSO raised an
        overlapping finding (populated during dedupe). Empty array if unique.
      - `native_score`: optional object preserving the specialist's native
        rubric (e.g. `{"confidence": 92}` for code,
        `{"impact": 3, "exploitability": 2, "severity_score": 6}` for security,
        `{"criticality": 8}` for tests, `{"dimensions": {...}}` for types).
        For lens reviewers and
        the report writer to surface in disputes.

      ## Dedupe rules

      Two findings from different specialists are considered duplicates when:
      - same `file` AND
      - their `line_range` start values are within ±5 of each other AND
      - their normalised categories overlap OR their descriptions overlap
        substantively (>50% semantic similarity by your judgement).

      When you find duplicates:
      - Keep ONE finding (the one with the highest conviction; tie-break
        on most-severe; tie-break on lexicographic ID).
      - Add the other specialists' names to `specialists_agreeing`.
      - Merge unique parts of `recommendation` into the kept finding's
        `recommendation` (separated by " — Also from <other>: <other rec>").

      ## Ranking

      Sort `consolidated_findings` by:
      1. severity descending (🔴 → 🟡 → 🔵)
      2. `len(specialists_agreeing) + 1` descending (multi-specialist findings outrank single)
      3. conviction descending
      4. id ascending (deterministic tiebreak)

      ## Output

      - `consolidated_findings`: the unified, deduped, ranked list.
      - `specialist_contributions`: object mapping specialist name to
        `{raised_count, kept_count, merged_into_other_count}` for the report writer.
      - `dedupe_summary`: short prose summary of merges performed.

      Use `write_file` to also persist the consolidated list to
      `<pr_data_dir>/consolidated-findings.json` so lens reviewers and
      the report writer can re-read it without paying for re-render.
    prompt: |
      Consolidate findings from these specialists.

      ## Valid specialists
      {{ specialist_gate.output.valid_specialists | tojson }}

      ## Skipped specialists (triage decided not to run these)
      {{ specialist_gate.output.skipped_specialists | tojson if specialist_gate.output.skipped_specialists is defined else '[]' }}

      ## Specialist outputs
      ```json
      {{ specialist_review.outputs | tojson }}
      ```

      ## PR data directory (for writing the persisted consolidated list)
      {{ workflow.input.pr_data_dir }}

      Steps:
      1. Iterate findings ONLY from valid specialists (skip the ones in
         skipped_specialists — their `findings: []` is by design, not a failure).
      2. Normalise each into the unified schema (see system prompt).
      3. Dedupe across specialists per the rules above.
      4. Rank.
      5. Use `write_file` to write
         `{{ workflow.input.pr_data_dir }}/consolidated-findings.json`
         containing the consolidated list.
      6. Emit `consolidated_findings`, `specialist_contributions`,
         `dedupe_summary` as structured output.
         **Do NOT include skipped specialists in `specialist_contributions`** —
         they didn't actually attempt to review and would distort the metrics.
    output:
      consolidated_findings:
        type: array
        description: "Unified, deduped, ranked finding set for lens reviewers to deliberate over."
        items:
          type: object
          properties:
            id: {type: string}
            category: {type: string}
            severity: {type: string}
            file: {type: string}
            line_range: {type: string}
            description: {type: string}
            recommendation: {type: string}
            suggested_fix: {type: string}
            conviction: {type: number}
            source_specialist: {type: string}
            specialists_agreeing:
              type: array
              items: {type: string}
            native_score: {type: object}
      specialist_contributions:
        type: object
        description: "Per-specialist counts: raised_count, kept_count, merged_into_other_count."
      dedupe_summary:
        type: string
        description: "Short prose summary of dedupe merges performed."
    routes:
      - to: persist_specialist_outputs

  # ───────────────────────────────────────────────────────────────────────────
  # PERSIST — Writes raw specialist outputs, gate output, and consolidator
  # output to pr_data_dir as JSON files. The render sub-workflow reads these
  # via MCP filesystem instead of receiving them through input_mapping.
  # Composed of three sequential script invocations: the bash exit-code wrapper
  # is replaced by a single agent that calls persist-json.sh three times.
  # ───────────────────────────────────────────────────────────────────────────
  - name: persist_specialist_outputs
    description: Persists raw specialist outputs, gate output, and consolidator output to pr_data_dir as JSON files
    type: script
    command: python3
    timeout: 60
    args:
      - "workflows/pr-review/scripts/persist_multi_json.py"
      - "{{ workflow.input.pr_data_dir }}"
      - "specialist-outputs.json"
      - "{{ specialist_review.outputs | tojson }}"
      - "gate-output.json"
      - "{{ specialist_gate.output | tojson }}"
      - "specialist-contributions.json"
      - "{{ consolidator.output.specialist_contributions | tojson }}"
    routes:
      - to: $end

# ─────────────────────────────────────────────────────────────────────────────
# WORKFLOW OUTPUT — Minimal status; rich data lives in pr_data_dir JSON files
# ─────────────────────────────────────────────────────────────────────────────
output:
  pr_data_dir: "{{ workflow.input.pr_data_dir }}"
  valid_count: "{{ specialist_gate.output.valid_count if specialist_gate is defined and specialist_gate.output is defined else 0 }}"
  valid_specialists: "{{ specialist_gate.output.valid_specialists | tojson if specialist_gate is defined and specialist_gate.output is defined else '[]' }}"
  invalid_specialists: "{{ specialist_gate.output.invalid_specialists | tojson if specialist_gate is defined and specialist_gate.output is defined else '[]' }}"
  skipped_by_triage: "{{ specialist_gate.output.skipped_specialists | tojson if specialist_gate is defined and specialist_gate.output is defined and specialist_gate.output.skipped_specialists is defined else (workflow.input.skipped_specialists | tojson) }}"
  degraded: "{{ specialist_gate.output.degraded if specialist_gate is defined and specialist_gate.output is defined else true }}"
  consolidated_findings: "{{ consolidator.output.consolidated_findings | tojson if consolidator is defined and consolidator.output is defined else '[]' }}"
  specialist_contributions: "{{ consolidator.output.specialist_contributions | tojson if consolidator is defined and consolidator.output is defined else '{}' }}"
  dedupe_summary: "{{ consolidator.output.dedupe_summary if consolidator is defined and consolidator.output is defined else '' }}"
  specialist_outputs_path: "{{ workflow.input.pr_data_dir }}/specialist-outputs.json"
  gate_output_path: "{{ workflow.input.pr_data_dir }}/gate-output.json"
  consolidated_findings_path: "{{ workflow.input.pr_data_dir }}/consolidated-findings.json"
  status: "{{ 'success' if persist_specialist_outputs is defined and persist_specialist_outputs.output is defined and persist_specialist_outputs.output.exit_code == 0 else 'failure' }}"
