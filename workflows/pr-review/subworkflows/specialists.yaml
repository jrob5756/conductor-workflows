      - `comment_kind`: critical_issue | improvement | recommended_removal
      - `description`: what's wrong with the comment
      - `recommendation`: rewrite suggestion or "remove this comment because…"
      - `suggested_fix`: code suggestion (or "")
      - `conviction`: 1-10

      You analyse and provide feedback only. Do NOT modify code or
