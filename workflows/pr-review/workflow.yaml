# PR Review Workflow
#
# Multi-agent PR review combining specialist depth with structured deliberation.
# Composed of five sub-workflows for separation of concerns:
#
#   pr_fetcher (gh CLI script — self-contained)
#     ↓
#   dispatcher (validates inputs, prepares nonce-wrapped diff, loads context)
#     ↓
#   triage (sub-workflow: subworkflows/triage.yaml)
#     Heuristic file-pattern classifier + cheap LLM pass + resolver. Decides
#     which specialists are actually needed for THIS PR. Skipped specialists
#     short-circuit via Jinja early-exit (no model load, ~50 tokens).
#     ↓
#   specialists (sub-workflow: subworkflows/specialists.yaml)
#     6 deep-domain specialists run in parallel (each with early-exit if not
#     in triage's recommended list) → gate → consolidator
#     ↓
#   deliberate (sub-workflow: subworkflows/deliberate.yaml)
#     2 cross-cutting lens reviewers run in parallel over the consolidated set,
#     then sequential deliberation rounds with arbitration until consensus or
#     max_rounds is exhausted
#     ↓
#   polish (sub-workflow: subworkflows/polish.yaml)
#     2 advisory polish agents (code-simplifier, dead-code-finder) in parallel
#     ↓
#   render (sub-workflow: subworkflows/render.yaml)
#     report_writer + inline_comments_writer + output_writer
#     ↓
#   [optional] poster (gh CLI script — gated on auto_post=true)
#     ↓
#   $end
#
# The five sub-workflows can also be invoked directly for debugging — each
# accepts the parent dispatcher's outputs as workflow inputs.
#
# Each sub-workflow persists its raw outputs to <pr_data_dir>/*.json so
# downstream stages and the render sub-workflow can read them via MCP
# filesystem instead of carrying everything through input_mapping.
#
# Usage:
#   conductor run workflows/pr-review/workflow.yaml \
#     --input pr_url="https://github.com/owner/repo/pull/123"
#
#   With focus and re-review delta mode:
#   conductor run workflows/pr-review/workflow.yaml \
#     --input pr_url="https://github.com/owner/repo/pull/123" \
#     --input focus="security and error handling" \
#     --input previous_review_path="reviews/pr-123-review-report.md" \
#     --input review_number=2
#
#   Auto-post the review back to the PR:
#   conductor run workflows/pr-review/workflow.yaml \
#     --input pr_url="https://github.com/owner/repo/pull/123" \
#     --input auto_post=true
#
# Requires:
#   - gh (GitHub CLI) on PATH and authenticated (`gh auth status`)
#   - python3 on PATH (used by the fetcher / poster / persist helpers)
#   - Node.js 18+ (used by the @modelcontextprotocol/server-filesystem MCP server)

workflow:
  name: pr-review
  description: Multi-agent PR review combining specialist depth (code, security, tests, errors, types, comments) with cross-lens deliberation, consensus arbitration, smart per-PR triage, and a non-blocking polish stage. Composed of five sub-workflows.
  version: "1.2.0"
  entry_point: pr_fetcher

  runtime:
    provider: copilot
    default_model: claude-sonnet-4.6
    max_session_seconds: 1800
    mcp_servers:
      filesystem:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
        tools: ["read_file", "write_file", "create_directory", "list_directory"]

  input:
    pr_url:
      type: string
      required: true
      description: "GitHub PR URL (e.g. https://github.com/owner/repo/pull/123). Only github.com URLs are supported in v1; ADO support is on the roadmap."

    focus:
      type: string
      required: false
      default: ""
      description: "Free-text guidance to direct reviewer attention (e.g., 'Focus on security and error handling around the auth changes')."

    exclude:
      type: array
      required: false
      default: []
      description: "Aspects to de-prioritise. Valid values: correctness, security, error_handling, performance, testing, completeness."

    enabled_specialists:
      type: array
      required: false
      default: ["code", "security", "tests", "errors", "types", "comments"]
      description: "User-facing whitelist of specialists. Triage intersects its recommendation with this list. Use to permanently exclude a specialist from all PRs."

    triage_mode:
      type: string
      required: false
      default: "auto"
      description: "How to choose which specialists run. 'auto' = run heuristic + LLM triage and skip non-applicable specialists (recommended). 'all' = bypass triage and run every specialist in enabled_specialists (safest, most expensive)."

    force_specialists:
      type: array
      required: false
      default: []
      description: "Specialists that must always run, bypassing triage's skip decision (but still subject to enabled_specialists)."

    triage_model:
      type: string
      required: false
      default: "claude-haiku-4.5"
      description: "Cheap model for the triage_llm step that refines the heuristic's specialist recommendation. Only ~3K tokens of context, ~200 tokens out — keep it cheap."

    include_polish:
      type: boolean
      required: false
      default: true
      description: "Run the polish sub-workflow (code-simplifier + dead-code-finder) after deliberation. Their findings are advisory and never block merge_readiness."

    polish_as_inline:
      type: boolean
      required: false
      default: false
      description: "Promote polish findings to inline PR comments. Default false: polish findings appear in the report only."

    strictness:
      type: number
      required: false
      default: 2
      description: "Review strictness (1-3). 1 = critical only. 2 = standard. 3 = thorough."

    max_rounds:
      type: number
      required: false
      default: 2
      description: "Maximum deliberation rounds (clamped 1-10)."

    custom_rules_dir:
      type: string
      required: false
      default: ""
      description: "Path to a .pr-review/ directory containing scoped custom rules."

    guidelines_path:
      type: string
      required: false
      default: ""
      description: "Path to a single team guidelines markdown file."

    codebase_context_path:
      type: string
      required: false
      default: ""
      description: "Path to a precomputed codebase-context markdown."

    previous_review_path:
      type: string
      required: false
      default: ""
      description: "Path to a prior pr-<N>-review-report.md from an earlier run. When provided, render produces a delta report."

    prior_feedback_path:
      type: string
      required: false
      default: ""
      description: "JSON file with PR-author / maintainer replies to the most recent prior bot review."

    review_number:
      type: number
      required: false
      default: 1
      description: "Sequential review number (1-based) for archive filenames + delta header."

    output_dir:
      type: string
      required: false
      default: ""
      description: "Where to write final artifacts. Empty = workflow temp dir."

    diff_boundary_nonce:
      type: string
      required: false
      default: ""
      description: "Pre-generated 8-char hex nonce for diff boundary markers. Empty → dispatcher generates one."

    auto_post:
      type: boolean
      required: false
      default: false
      description: "Post the rendered comment + inline comments back to the PR via gh CLI when complete."

    lens_skeptic_model:
      type: string
      required: false
      default: "claude-opus-4.7"
      description: "Model for the Skeptic lens."

    lens_completeness_model:
      type: string
      required: false
      default: "gpt-5.5"
      description: "Model for the Completeness lens (cross-family)."

    specialist_code_model:
      type: string
      required: false
      default: "claude-opus-4.7"
    specialist_security_model:
      type: string
      required: false
      default: "claude-opus-4.7"
      description: "Model for specialist_security (CVSS-style vulnerability review). Defaults to opus because security balancing of true-positives vs false-positives benefits from strong reasoning."
    specialist_tests_model:
      type: string
      required: false
      default: "claude-sonnet-4.6"
    specialist_errors_model:
      type: string
      required: false
      default: "claude-opus-4.7"
    specialist_types_model:
      type: string
      required: false
      default: "claude-sonnet-4.6"
    specialist_comments_model:
      type: string
      required: false
      default: "claude-sonnet-4.6"
    polish_simplifier_model:
      type: string
      required: false
      default: "claude-sonnet-4.6"
    polish_dead_code_model:
      type: string
      required: false
      default: "claude-sonnet-4.6"

  context:
    mode: explicit

  limits:
    # Slim parent: pr_fetcher + dispatcher + 5 sub-workflow calls + poster = 8
    # Sub-workflows have their own iteration budgets internally.
    max_iterations: 30

  cost:
    show_summary: true
    show_per_agent: true

# ─────────────────────────────────────────────────────────────────────────────
# AGENTS
# ─────────────────────────────────────────────────────────────────────────────
agents:

  # ───────────────────────────────────────────────────────────────────────────
  # PR_FETCHER — Script step. Uses gh CLI to fetch PR data from GitHub.
  # Writes metadata.json, diff.patch, changed-files.json into a temp dir.
  # Emits a JSON object on stdout that conductor auto-merges into output.*
  # so downstream agents can reference pr_fetcher.output.pr_data_dir etc.
  # ───────────────────────────────────────────────────────────────────────────
  - name: pr_fetcher
    description: Fetches PR metadata, diff, and changed files from GitHub using the gh CLI
    type: script
    command: bash
    timeout: 120
    args:
      - "workflows/pr-review/scripts/fetch-pr.sh"
      - "{{ workflow.input.pr_url }}"
      - "{{ workflow.input.output_dir }}"
    routes:
      - to: $end
        when: "{{ output.exit_code != 0 }}"
      - to: dispatcher

  - name: dispatcher
    description: Validates inputs, wraps the diff in nonce-based boundary markers, and loads optional reviewer context (custom rules, codebase context, work items, prior author feedback, team guidelines)
    model: claude-sonnet-4.6
    input:
      - pr_fetcher.output.pr_data_dir
      - pr_fetcher.output.pr_url
      - pr_fetcher.output.pr_number
      - pr_fetcher.output.platform
      - workflow.input.guidelines_path?
      - workflow.input.focus
      - workflow.input.exclude
      - workflow.input.output_dir
      - workflow.input.max_rounds
      - workflow.input.strictness
      - workflow.input.codebase_context_path?
      - workflow.input.custom_rules_dir?
      - workflow.input.previous_review_path?
      - workflow.input.prior_feedback_path?
      - workflow.input.diff_boundary_nonce?
    system_prompt: |
      You are a PR review dispatcher. Your job is to validate inputs, prepare
      the diff for downstream specialists with nonce-based boundary markers,
      and load optional context files (custom rules, codebase context, linked
      work items, prior author feedback, team guidelines).

      You are a setup agent — do NOT review or analyse the code. Validate
      inputs, prepare files, output paths and metadata.

      ## Path Validation (defense in depth)

      The MCP filesystem server is scoped to "." (the working directory) — that
      is the hard security boundary. The validation below is defense in depth
      to fail fast with clear error messages.

      Normalise each path (resolve URL-encoded sequences, collapse separators,
      convert backslashes to forward slashes), then verify it does NOT contain
      `../` or `..\\`. Validate every path-typed input that is non-empty:
      pr_data_dir, output_dir, guidelines_path, codebase_context_path,
      custom_rules_dir, previous_review_path,
      prior_feedback_path. If traversal is detected anywhere, set the
      offending path to an empty string and record the error in metadata.

      ## Strictness / Max Rounds Validation

      - `strictness` must be 1, 2, or 3. Out-of-range values default to 2 and
        are recorded in metadata.
      - `max_rounds` is clamped to [1, 10]. Record any clamping in metadata.

      ## Exclude Field Hygiene

      For each value in `exclude`: trim whitespace, drop empty strings, dedupe,
      lowercase. Valid values: correctness, security, error_handling,
      performance, testing, completeness.

      ## Diff Preparation (mandatory)

      1. Read `<pr_data_dir>/diff.patch` using the `read_file` tool.
      2. Choose a nonce: if `diff_boundary_nonce` workflow input is non-empty,
         use it as-is. Otherwise generate an 8-char hex string (e.g. `a3f8b2c1`).
      3. Use `write_file` to write `<pr_data_dir>/prepared-diff.txt` with the
         exact content `<diff-NONCE>\n<raw diff content>\n</diff-NONCE>` where
         `NONCE` is the chosen hex string.
      4. Output the nonce as `diff_boundary_nonce` so specialists know the marker.

      ## Optional Context Files

      For each of the following inputs that is non-empty, use `read_file` to
      load the file content. If a file is missing or unreadable, set the
      corresponding output to an empty string and note it in metadata — none of
      these are fatal.

      - `guidelines_path` → `guidelines_content`
      - `codebase_context_path` → `codebase_context`
      - `prior_feedback_path` → `prior_feedback_content`

      ### Custom Rules

      If `custom_rules_dir` is non-empty, attempt to read these files inside it:
      - `config.json` — structured rules with glob scopes
      - `rules.md` — free-form prose rules
      - `files.json` — reference file paths

      Combine into a single `custom_rules` string with clear section headers
      so reviewers know which rules apply where. Missing files are not errors.

    prompt: |
      Read the PR metadata and prepare files for review.

      **PR data directory:** {{ pr_fetcher.output.pr_data_dir }}
      **PR URL:** {{ pr_fetcher.output.pr_url }}

      {% if workflow.input.guidelines_path %}
      **Guidelines path:** {{ workflow.input.guidelines_path }}
      {% endif %}

      **Focus areas:** {{ workflow.input.focus }}
      **Exclude areas:** {{ workflow.input.exclude | tojson }}
      **Output directory:** {{ workflow.input.output_dir }}
      **Max rounds:** {{ workflow.input.max_rounds }}

      Steps:

      1. **Validate paths** — check `../` and `..\\` in every non-empty path
         input. Reject any traversal attempts.
      2. **Validate exclude** — trim, dedupe, lowercase.
      3. **Validate strictness** — if not 1/2/3, default to 2 (record in metadata).
      4. **Validate max_rounds** — clamp to [1, 10] (record any clamping).
      5. Use `read_file` to load `{{ pr_fetcher.output.pr_data_dir }}/metadata.json`
         and parse it.
      6. **Prepare diff**: use `read_file` to load
         `{{ pr_fetcher.output.pr_data_dir }}/diff.patch`.
         {% if workflow.input.diff_boundary_nonce %}
         Use the pre-generated nonce: `{{ workflow.input.diff_boundary_nonce }}`.
         {% else %}
         Generate an 8-character hex nonce.
         {% endif %}
         Use `write_file` to write
         `{{ pr_fetcher.output.pr_data_dir }}/prepared-diff.txt` containing
         `<diff-NONCE>\n` + raw diff + `\n</diff-NONCE>`. Output the nonce
         as `diff_boundary_nonce`.
      7. {% if workflow.input.guidelines_path %}Read the guidelines file at
         `{{ workflow.input.guidelines_path }}` into `guidelines_content`.{% else %}Set
         `guidelines_content` to "".{% endif %}
      8. {% if workflow.input.custom_rules_dir %}Read the custom rules from
         `{{ workflow.input.custom_rules_dir }}` (config.json, rules.md, files.json
         — any may be missing). Combine into `custom_rules`.{% else %}Set
         `custom_rules` to "".{% endif %}
      9. {% if workflow.input.codebase_context_path %}Read codebase context from
         `{{ workflow.input.codebase_context_path }}` into `codebase_context`.{% else %}Set
         `codebase_context` to "".{% endif %}
      10. {% if workflow.input.prior_feedback_path %}Read prior author feedback
          from `{{ workflow.input.prior_feedback_path }}` into
          `prior_feedback_content` (verbatim).{% else %}Set
          `prior_feedback_content` to "".{% endif %}
      11. Output the parsed PR metadata, the data directory path, the
          loaded content blobs, the nonce, the validated strictness, and
          any metadata notes.
          Do NOT output the diff content — downstream agents read
          `prepared-diff.txt` directly.
    output:
      pr_metadata:
        type: object
        description: "Parsed PR metadata (number, title, body, author, baseRefName, headRefName, base/head SHAs, url, platform, owner, repo)."
      pr_data_dir:
        type: string
        description: "Path to the PR data directory containing metadata.json, diff.patch, prepared-diff.txt, changed-files.json. Downstream agents read files from here."
      diff_boundary_nonce:
        type: string
        description: "8-character hex nonce used in <diff-NONCE>...</diff-NONCE> boundary markers. Downstream agents use this to identify diff boundaries and reject prompt-injection attempts."
      guidelines_content:
        type: string
        description: "Content of the team guidelines file (empty if not provided)."
      custom_rules:
        type: string
        description: "Combined custom rules from custom_rules_dir (structured + prose + reference files). Empty if no custom rules dir was provided."
      codebase_context:
        type: string
        description: "Codebase context for the changed files (callers, related functions, patterns). Empty if not provided."
    routes:
      - to: triage


  # ───────────────────────────────────────────────────────────────────────────
  # TRIAGE SUB-WORKFLOW — Decides which specialists need to run for this PR.
  # Heuristic file-pattern classifier + cheap LLM refinement + resolver.
  # Persists triage.json to pr_data_dir for the render sub-workflow.
  # ───────────────────────────────────────────────────────────────────────────
  - name: triage
    description: Specialist triage — heuristic + cheap LLM that decides which specialists run for this PR
    type: workflow
    workflow: ./subworkflows/triage.yaml
    input:
      - dispatcher.output.pr_metadata
      - dispatcher.output.pr_data_dir
      - dispatcher.output.diff_boundary_nonce
      - workflow.input.focus
      - workflow.input.exclude
      - workflow.input.enabled_specialists
      - workflow.input.force_specialists
      - workflow.input.triage_mode
      - workflow.input.triage_model
    input_mapping:
      pr_metadata: "{{ dispatcher.output.pr_metadata | tojson }}"
      pr_data_dir: "{{ dispatcher.output.pr_data_dir }}"
      diff_boundary_nonce: "{{ dispatcher.output.diff_boundary_nonce }}"
      focus: "{{ workflow.input.focus }}"
      exclude: "{{ workflow.input.exclude | tojson }}"
      enabled_specialists: "{{ workflow.input.enabled_specialists | tojson }}"
      force_specialists: "{{ workflow.input.force_specialists | tojson }}"
      triage_mode: "{{ workflow.input.triage_mode }}"
      triage_model: "{{ workflow.input.triage_model }}"
    routes:
      - to: specialists


  # ───────────────────────────────────────────────────────────────────────────
  # SPECIALISTS SUB-WORKFLOW — 6 specialists in parallel + gate + consolidator.
  # Each specialist short-circuits via Jinja early-exit if not in
  # triage.output.recommended_specialists.
  # Persists raw outputs to pr_data_dir for the render sub-workflow to read.
  # ───────────────────────────────────────────────────────────────────────────
  - name: specialists
    description: Specialist review phase — runs 6 deep-domain specialists in parallel (gated by triage), validates them, normalises and dedupes findings
    type: workflow
    workflow: ./subworkflows/specialists.yaml
    input:
      - dispatcher.output.pr_metadata
      - dispatcher.output.pr_data_dir
      - dispatcher.output.diff_boundary_nonce
      - dispatcher.output.guidelines_content
      - dispatcher.output.custom_rules
      - dispatcher.output.codebase_context
      - dispatcher.output.prior_feedback_content
      - dispatcher.output.strictness
      - workflow.input.focus
      - workflow.input.exclude
      - workflow.input.enabled_specialists
      - triage.output.recommended_specialists
      - triage.output.skipped_specialists
      - workflow.input.specialist_code_model
      - workflow.input.specialist_security_model
      - workflow.input.specialist_tests_model
      - workflow.input.specialist_errors_model
      - workflow.input.specialist_types_model
      - workflow.input.specialist_comments_model
    input_mapping:
      pr_metadata: "{{ dispatcher.output.pr_metadata | tojson }}"
      pr_data_dir: "{{ dispatcher.output.pr_data_dir }}"
      diff_boundary_nonce: "{{ dispatcher.output.diff_boundary_nonce }}"
      guidelines_content: "{{ dispatcher.output.guidelines_content | default('') }}"
      custom_rules: "{{ dispatcher.output.custom_rules | default('') }}"
      codebase_context: "{{ dispatcher.output.codebase_context | default('') }}"
      prior_feedback_content: "{{ dispatcher.output.prior_feedback_content | default('') }}"
      strictness: "{{ dispatcher.output.strictness }}"
      focus: "{{ workflow.input.focus }}"
      exclude: "{{ workflow.input.exclude | tojson }}"
      enabled_specialists: "{{ workflow.input.enabled_specialists | tojson }}"
      recommended_specialists: "{{ triage.output.recommended_specialists }}"
      skipped_specialists: "{{ triage.output.skipped_specialists }}"
      specialist_code_model: "{{ workflow.input.specialist_code_model }}"
      specialist_security_model: "{{ workflow.input.specialist_security_model }}"
      specialist_tests_model: "{{ workflow.input.specialist_tests_model }}"
      specialist_errors_model: "{{ workflow.input.specialist_errors_model }}"
      specialist_types_model: "{{ workflow.input.specialist_types_model }}"
      specialist_comments_model: "{{ workflow.input.specialist_comments_model }}"
    routes:
      - to: deliberate
        when: "{{ specialists.output.valid_count >= 1 }}"
      - to: $end

  # ───────────────────────────────────────────────────────────────────────────
  # DELIBERATE SUB-WORKFLOW — Lens reviewers + deliberation rounds + arbitrator.
  # Persists raw outputs to pr_data_dir for the render sub-workflow.
  # ───────────────────────────────────────────────────────────────────────────
  - name: deliberate
    description: Deliberation phase — cross-lens review, sequential deliberation rounds, arbitration to consensus
    type: workflow
    workflow: ./subworkflows/deliberate.yaml
    input:
      - dispatcher.output.pr_metadata
      - dispatcher.output.pr_data_dir
      - dispatcher.output.diff_boundary_nonce
      - dispatcher.output.guidelines_content
      - dispatcher.output.custom_rules
      - dispatcher.output.codebase_context
      - dispatcher.output.prior_feedback_content
      - dispatcher.output.strictness
      - dispatcher.output.max_rounds
      - specialists.output.consolidated_findings
      - specialists.output.specialist_contributions
      - workflow.input.focus
      - workflow.input.exclude
      - workflow.input.lens_skeptic_model
      - workflow.input.lens_completeness_model
    input_mapping:
      pr_metadata: "{{ dispatcher.output.pr_metadata | tojson }}"
      pr_data_dir: "{{ dispatcher.output.pr_data_dir }}"
      diff_boundary_nonce: "{{ dispatcher.output.diff_boundary_nonce }}"
      guidelines_content: "{{ dispatcher.output.guidelines_content | default('') }}"
      custom_rules: "{{ dispatcher.output.custom_rules | default('') }}"
      codebase_context: "{{ dispatcher.output.codebase_context | default('') }}"
      prior_feedback_content: "{{ dispatcher.output.prior_feedback_content | default('') }}"
      strictness: "{{ dispatcher.output.strictness }}"
      max_rounds: "{{ dispatcher.output.max_rounds }}"
      focus: "{{ workflow.input.focus }}"
      exclude: "{{ workflow.input.exclude | tojson }}"
      consolidated_findings: "{{ specialists.output.consolidated_findings }}"
      specialist_contributions: "{{ specialists.output.specialist_contributions }}"
      lens_skeptic_model: "{{ workflow.input.lens_skeptic_model }}"
      lens_completeness_model: "{{ workflow.input.lens_completeness_model }}"
    routes:
      - to: polish

  # ───────────────────────────────────────────────────────────────────────────
  # POLISH SUB-WORKFLOW — Advisory-only code-simplifier + dead-code-finder.
  # Always runs (cheap when include_polish=false; agents skip themselves).
  # ───────────────────────────────────────────────────────────────────────────
  - name: polish
    description: Polish phase — advisory-only code-simplifier and dead-code-finder
    type: workflow
    workflow: ./subworkflows/polish.yaml
    input:
      - dispatcher.output.pr_metadata
      - dispatcher.output.pr_data_dir
      - dispatcher.output.diff_boundary_nonce
      - dispatcher.output.guidelines_content
      - workflow.input.include_polish
      - workflow.input.polish_simplifier_model
      - workflow.input.polish_dead_code_model
    input_mapping:
      pr_metadata: "{{ dispatcher.output.pr_metadata | tojson }}"
      pr_data_dir: "{{ dispatcher.output.pr_data_dir }}"
      diff_boundary_nonce: "{{ dispatcher.output.diff_boundary_nonce }}"
      guidelines_content: "{{ dispatcher.output.guidelines_content | default('') }}"
      include_polish: "{{ workflow.input.include_polish }}"
      polish_simplifier_model: "{{ workflow.input.polish_simplifier_model }}"
      polish_dead_code_model: "{{ workflow.input.polish_dead_code_model }}"
    routes:
      - to: render

  # ───────────────────────────────────────────────────────────────────────────
  # RENDER SUB-WORKFLOW — report_writer + inline_comments_writer + output_writer.
  # Receives all upstream rich data via input_mapping (with tojson) so the
  # report agents can reference workflow.input.* without disk reads.
  # ───────────────────────────────────────────────────────────────────────────
  - name: render
    description: Render phase — composes the review markdown, builds inline comments, writes versioned artifacts to disk
    type: workflow
    workflow: ./subworkflows/render.yaml
    input:
      - dispatcher.output.pr_metadata
      - dispatcher.output.pr_data_dir
      - dispatcher.output.guidelines_content
      - dispatcher.output.prior_feedback_content
      - triage.output
      - specialists.output
      - deliberate.output
      - polish.output
      - workflow.input.focus
      - workflow.input.exclude
      - workflow.input.max_rounds
      - workflow.input.strictness
      - workflow.input.lens_skeptic_model
      - workflow.input.lens_completeness_model
      - workflow.input.review_number
      - workflow.input.include_polish
      - workflow.input.enabled_specialists
      - workflow.input.triage_mode
      - workflow.input.polish_as_inline
      - workflow.input.output_dir
      - workflow.input.previous_review_path
      - workflow.input.prior_feedback_path
    input_mapping:
      pr_metadata: "{{ dispatcher.output.pr_metadata | tojson }}"
      pr_data_dir: "{{ dispatcher.output.pr_data_dir }}"
      guidelines_content: "{{ dispatcher.output.guidelines_content | default('') }}"
      prior_feedback_content: "{{ dispatcher.output.prior_feedback_content | default('') }}"

      # triage.output.* — what ran vs what was skipped, and why.
      has_triage: "true"
      triage_mode: "{{ triage.output.triage_mode }}"
      recommended_specialists: "{{ triage.output.recommended_specialists }}"
      skipped_specialists: "{{ triage.output.skipped_specialists }}"
      triage_rationale: "{{ triage.output.rationale | default('') }}"
      triage_persisted_path: "{{ triage.output.triage_persisted_path | default('') }}"

      # specialists.output.* — read from sub-workflow output (already JSON-typed)
      specialist_outputs: "{{ specialists.output.specialist_outputs_path }}"
      valid_count: "{{ specialists.output.valid_count }}"
      valid_specialists: "{{ specialists.output.valid_specialists }}"
      invalid_specialists: "{{ specialists.output.invalid_specialists }}"
      degraded: "{{ specialists.output.degraded }}"
      consolidated_findings: "{{ specialists.output.consolidated_findings }}"
      specialist_contributions: "{{ specialists.output.specialist_contributions }}"
      dedupe_summary: "{{ specialists.output.dedupe_summary | default('') }}"
      has_consolidator: "true"

      # deliberate.output.* — when deliberate ran (specialists had ≥1 valid), pass through.
      has_deliberation: "true"
      has_lens_review: "true"
      lens_outputs: "{{ deliberate.output.lens_outputs_path | default('') }}"
      agreed_findings: "{{ deliberate.output.agreed_findings | default('[]') }}"
      open_disagreements: "{{ deliberate.output.open_disagreements | default('[]') }}"
      consensus_reached: "{{ deliberate.output.consensus_reached | default(false) }}"
      round_number: "{{ deliberate.output.round_number | default(0) }}"
      round_summary: "{{ deliberate.output.round_summary | default('') }}"
      confidence_score: "{{ deliberate.output.confidence_score | default(0) }}"

      # polish.output.* — always passed; agents skip when include_polish=false.
      has_polish_outputs: "{{ workflow.input.include_polish }}"
      polish_simplifier_output: '{{ {"skipped": polish.output.simplifier_skipped, "findings_count": polish.output.simplifier_finding_count, "path": polish.output.polish_outputs_path} | tojson }}'
      polish_dead_code_output: '{{ {"skipped": polish.output.dead_code_skipped, "findings_count": polish.output.dead_code_finding_count, "path": polish.output.polish_outputs_path} | tojson }}'

      # Workflow inputs forwarded
      focus: "{{ workflow.input.focus }}"
      exclude: "{{ workflow.input.exclude | tojson }}"
      max_rounds: "{{ workflow.input.max_rounds }}"
      strictness: "{{ workflow.input.strictness }}"
      lens_skeptic_model: "{{ workflow.input.lens_skeptic_model }}"
      lens_completeness_model: "{{ workflow.input.lens_completeness_model }}"
      review_number: "{{ workflow.input.review_number }}"
      include_polish: "{{ workflow.input.include_polish }}"
      enabled_specialists: "{{ workflow.input.enabled_specialists | tojson }}"
      polish_as_inline: "{{ workflow.input.polish_as_inline }}"
      output_dir: "{{ workflow.input.output_dir | default('') }}"
      previous_review_path: "{{ workflow.input.previous_review_path | default('') }}"
      prior_feedback_path: "{{ workflow.input.prior_feedback_path | default('') }}"
    routes:
      - to: poster
        when: "{{ workflow.input.auto_post }}"
      - to: $end

  # ───────────────────────────────────────────────────────────────────────────
  # POSTER — Optional script step. Posts the rendered comment + inline
  # comments back to the PR via gh CLI. Gated on workflow.input.auto_post.
  # ───────────────────────────────────────────────────────────────────────────
  - name: poster
    description: Posts the rendered review comment and inline comments back to the PR via the gh CLI
    type: script
    command: bash
    timeout: 180
    args:
      - "workflows/pr-review/scripts/post-review.sh"
      - "{{ pr_fetcher.output.owner }}"
      - "{{ pr_fetcher.output.repo }}"
      - "{{ pr_fetcher.output.pr_number }}"
      - "{{ render.output.review_path }}"
      - "{{ render.output.inline_comments_path }}"
    routes:
      - to: $end

# ─────────────────────────────────────────────────────────────────────────────
# WORKFLOW OUTPUT
# ─────────────────────────────────────────────────────────────────────────────
output:
  pr_url: "{{ pr_fetcher.output.pr_url if pr_fetcher is defined and pr_fetcher.output is defined else '' }}"
  pr_number: "{{ pr_fetcher.output.pr_number if pr_fetcher is defined and pr_fetcher.output is defined else 0 }}"
  pr_data_dir: "{{ pr_fetcher.output.pr_data_dir if pr_fetcher is defined and pr_fetcher.output is defined else '' }}"
  review_number: "{{ workflow.input.review_number }}"
  review_path: "{{ render.output.review_path if render is defined and render.output is defined else '' }}"
  review_report_path: "{{ render.output.review_report_path if render is defined and render.output is defined else '' }}"
  review_archive_path: "{{ render.output.review_archive_path if render is defined and render.output is defined else '' }}"
  review_report_archive_path: "{{ render.output.review_report_archive_path if render is defined and render.output is defined else '' }}"
  inline_comments_path: "{{ render.output.inline_comments_path if render is defined and render.output is defined else '' }}"
  consensus_reached: "{{ deliberate.output.consensus_reached if deliberate is defined and deliberate.output is defined else false }}"
  rounds_completed: "{{ deliberate.output.round_number if deliberate is defined and deliberate.output is defined else 0 }}"
  max_rounds: "{{ workflow.input.max_rounds }}"
  merge_readiness: "{{ render.output.merge_readiness if render is defined and render.output is defined else 'unknown' }}"
  confidence_score: "{{ deliberate.output.confidence_score if deliberate is defined and deliberate.output is defined else (render.output.confidence_score if render is defined and render.output is defined else 0) }}"
  is_delta: "{{ render.output.is_delta if render is defined and render.output is defined else false }}"
  findings_dropped_via_feedback: "{{ render.output.findings_dropped_via_feedback if render is defined and render.output is defined else 0 }}"
  findings_downgraded_via_feedback: "{{ render.output.findings_downgraded_via_feedback if render is defined and render.output is defined else 0 }}"
  findings_reraised_with_acknowledgement: "{{ render.output.findings_reraised_with_acknowledgement if render is defined and render.output is defined else 0 }}"
  polish_findings_count: "{{ polish.output.total_polish_findings if polish is defined and polish.output is defined else 0 }}"
  strictness: "{{ workflow.input.strictness }}"
  enabled_specialists: "{{ workflow.input.enabled_specialists | tojson }}"
  triage_mode: "{{ workflow.input.triage_mode }}"
  recommended_specialists: "{{ triage.output.recommended_specialists if triage is defined and triage.output is defined else '[]' }}"
  skipped_specialists: "{{ triage.output.skipped_specialists if triage is defined and triage.output is defined else '[]' }}"
  include_polish: "{{ workflow.input.include_polish }}"
  posted_comment_url: "{{ poster.output.posted_comment_url if poster is defined and poster.output is defined else '' }}"
  status: "{{ render.output.status if render is defined and render.output is defined else 'failure' }}"
